<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Configuração — Gestor de Bombas Key</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:20px 24px 24px; }
  .brand { display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px 0 16px; border-bottom:1px solid #1e293b; margin-bottom:16px; }
  .brand img { height:48px; width:auto; }
  .brand .company { font-size:11px; color:#94a3b8; letter-spacing:1.5px; text-transform:uppercase; }
  h1 { font-size:18px; margin:0 0 4px; color:#429350; text-align:center; }
  p.sub { font-size:12px; color:#94a3b8; margin:0 0 18px; text-align:center; }
  label { display:block; font-size:12px; margin:14px 0 4px; color:#cbd5e1; }
  input, select { width:100%; box-sizing:border-box; padding:9px 10px; background:#1e293b; border:1px solid #334155; color:#fff; border-radius:6px; font-size:13px; font-family:inherit; }
  input:focus, select:focus { outline:none; border-color:#429350; }
  .row { display:flex; gap:6px; align-items:stretch; }
  .row select { flex:1; }
  .icon-btn { padding:0 12px; background:#1e293b; border:1px solid #334155; color:#cbd5e1; border-radius:6px; font-size:14px; cursor:pointer; }
  .icon-btn:hover { background:#334155; border-color:#429350; color:#fff; }
  button.primary { width:100%; margin-top:18px; padding:11px; background:#429350; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
  button.primary:disabled { opacity:0.6; cursor:wait; }
  .err { margin-top:12px; padding:10px; background:#7f1d1d; color:#fecaca; border-radius:6px; font-size:12px; }
  .ok { margin-top:12px; padding:10px; background:#14532d; color:#bbf7d0; border-radius:6px; font-size:12px; }
  .hint { font-size:11px; color:#64748b; margin-top:4px; }
  .footer { margin-top:18px; text-align:center; font-size:10px; color:#475569; letter-spacing:0.5px; }
</style>
</head>
<body>
  <div class="brand">
    <img src="renov-logo.png" alt="Renov Tecnologia Agrícola" />
    <span class="company">Renov Tecnologia Agrícola®</span>
  </div>

  <h1>Gestor de Bombas Key</h1>
  <p class="sub">Configuração inicial — credenciais da conta de serviço da fazenda.</p>

  <label>Email (conta de serviço)</label>
  <input id="email" type="email" placeholder="agente@suafazenda.com" autocomplete="off" />

  <label>Senha</label>
  <input id="password" type="password" autocomplete="off" />

  <label>Farm ID (UUID da fazenda)</label>
  <input id="farmId" type="text" placeholder="00000000-0000-0000-0000-000000000000" autocomplete="off" />
  <div class="hint">Encontre em Configurações → Fazenda no interface web.</div>

  <label>Porta COM (Servidor RS-232)</label>
  <div class="row">
    <select id="comPort"><option value="">Auto-detectar</option></select>
    <button type="button" id="refreshPorts" class="icon-btn" title="Atualizar lista">🔄</button>
  </div>
  <div class="hint">Conecte o cabo USB do Servidor antes de salvar. Você pode trocar depois pelo menu da bandeja.</div>

  <button id="btn" class="primary">Validar e Salvar</button>
  <div id="msg"></div>

  <div class="footer">© Renov Tecnologia Agrícola®</div>

<script>
  // Credenciais públicas do projeto Lovable Cloud (Supabase) embutidas
  const SUPABASE_URL = "https://dnyukgfedredvxpzjpqz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRueXVrZ2ZlZHJlZHZ4cHpqcHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODU1OTQsImV4cCI6MjA5MjI2MTU5NH0.OSg44w0CRVvD-f6Ts_U9DVeQkQ-4c37passKEK5X0kk";

  const sel = document.getElementById("comPort");
  const refreshBtn = document.getElementById("refreshPorts");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  async function loadPorts() {
    refreshBtn.disabled = true;
    refreshBtn.textContent = "…";
    try {
      const ports = await window.setupAPI.listPorts();
      const prev = sel.value;
      sel.innerHTML = '<option value="">Auto-detectar (recomendado)</option>';
      for (const p of ports) {
        const opt = document.createElement("option");
        opt.value = p.path;
        const lbl = p.manufacturer ? ` — ${String(p.manufacturer).substring(0, 50)}` : "";
        opt.textContent = `${p.path}${lbl}`;
        sel.appendChild(opt);
      }
      if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
      if (ports.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "(nenhuma porta detectada — conecte o cabo USB)";
        opt.disabled = true;
        sel.appendChild(opt);
      }
    } catch (e) {
      console.error(e);
      msg.innerHTML = '<div class="err">Falha ao listar portas: ' + (e.message || e) + '</div>';
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.textContent = "🔄";
    }
  }

  refreshBtn.onclick = loadPorts;
  loadPorts();

  btn.onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const farmId = document.getElementById("farmId").value.trim();
    const comPort = sel.value || null;
    if (!email || !password || !farmId) { msg.innerHTML = '<div class="err">Preencha email, senha e Farm ID.</div>'; return; }
    btn.disabled = true; btn.textContent = "Validando…"; msg.innerHTML = "";
    try {
      const res = await window.setupAPI.saveConfig({
        email, password, farmId, comPort,
        supabaseUrl: SUPABASE_URL,
        supabaseAnonKey: SUPABASE_ANON_KEY,
      });
      if (res && res.success) {
        msg.innerHTML = '<div class="ok">✅ Configurado! O agente vai iniciar em segundo plano.</div>';
        setTimeout(() => window.close(), 1500);
      } else {
        btn.disabled = false; btn.textContent = "Validar e Salvar";
        msg.innerHTML = '<div class="err">❌ ' + ((res && res.error) || "Falha") + '</div>';
      }
    } catch (e) {
      btn.disabled = false; btn.textContent = "Validar e Salvar";
      msg.innerHTML = '<div class="err">❌ ' + (e.message || e) + '</div>';
    }
  };
</script>
</body>
</html>
