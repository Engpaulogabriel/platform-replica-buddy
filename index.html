  <body>
    <div id="root"></div>
    <script>
      // F2 — Frame-buster: se este app for carregado dentro de iframe, quebra.
      try {
        if (window.top && window.top !== window.self) {
          window.top.location = window.self.location.href;
        }
      } catch (_e) {
        // Cross-origin bloqueou o acesso → estamos em iframe hostil, esconder UI.
        document.documentElement.style.display = "none";
      }
    </script>
    <script>
      // Remover após 2026-06-17. Roda no HTML estático, antes do bundle.
      (function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) {
              var url =
                (reg.active && reg.active.scriptURL) ||
                (reg.installing && reg.installing.scriptURL) ||
                (reg.waiting && reg.waiting.scriptURL) ||
                "";
              // Só o SW do app — não toca em workers de mensageria (ex. FCM)
              if (url.indexOf("/sw.js") !== -1 || url === "") {
                reg.unregister();
              }
            });
          });
        }
        if ("caches" in window) {
          caches.keys().then(function (names) {
            names.forEach(function (name) {
              if (
                /(^|-)precache-|(^|-)runtime-/.test(name) ||
                ["html-cache", "api-cache", "static-media", "static-code"].indexOf(name) !== -1
              ) {
                caches.delete(name);
              }
            });
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
